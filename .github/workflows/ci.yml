name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Website/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Website/package-lock.json
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Website/package-lock.json
      - run: npm ci
      - run: npm run build

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./Website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Website/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Start server
        run: npx next start -p 3001 &
        env:
          PORT: 3001
      - name: Wait for server
        run: npx wait-on http://localhost:3001 --timeout 30000
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3001
            http://localhost:3001/franchise
          budgetPath: ./Website/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
